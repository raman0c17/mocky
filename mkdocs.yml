site_name: Mocky
site_description: Turn an idea or Markdown into a polished, cross-platform PowerPoint deck.
site_url: https://raman0c17.github.io/mocky/
repo_url: https://github.com/raman0c17/mocky
repo_name: raman0c17/mocky
edit_uri: edit/master/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Usage: usage.md
  - Templates: templates.md
  - AI agent prompts: agents.md
  - Cross-platform, Docker & library: cross-platform.md
  - Claude skill: skill.md
  - Contributing: contributing.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables

plugins:
  - search
